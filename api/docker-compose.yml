services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=password # Change this to a secure password in production
    volumes:
      - ./grafana.yml:/etc/grafana/grafana.yml
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-network
    restart: unless-stopped

  loki:
    user: root
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "9080:9080"
    volumes:
      - ./promtail.yml:/etc/promtail/config.yaml
      - ./logs:/var/lib/lolgraph/logs
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - monitoring-network
    restart: unless-stopped

  lolgraph:
    container_name: lolgraph
    build: 
      context: .
      dockerfile: Dockerfile
    image: lolgraph:latest
    ports:
      - "8080:8080"
    volumes:
      - .:/var/lib/lolgraph
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5
    develop:
      watch:
        - path: .
          action: rebuild


volumes:
  prom_data:
  grafana_data:
  loki_data:
  lolgraph_data:

networks:
  monitoring-network:
    driver: bridge
